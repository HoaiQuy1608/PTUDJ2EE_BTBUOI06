<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
    <title>Edit product</title>
</head>
<body>
<div layout:fragment="content" class="container body-content">
    <form th:action="@{/products/edit}" th:object="${product}" method="post" class="form" enctype="multipart/form-data">

        <input type="hidden" th:field="*{id}">
        <input type="hidden" th:field="*{image}">

        <div class="form-group mb-3">
            <label for="name">Name</label>
            <input class="form-control" type="text" th:field="*{name}" id="name" placeholder="product Name">
            <div class="alert alert-warning" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>
        <div class="form-group mb-3">
            <label for="price">Price:</label>
            <input class="form-control" type="number" th:field="*{price}" id="price" placeholder="price">
            <div class="alert alert-warning" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
        </div>
        <div class="form-group mb-3">
            <label>Current Image:</label>
            <div>
                <img th:if="*{image != null}" th:src="@{|/images/*{image}|}" height="100" alt="Current Image">
            </div>

            <label for="imageUpload" class="mt-2">Upload New Image (Để trống nếu không muốn đổi ảnh):</label>
            <input class="form-control" type="file" id="imageUpload" name="imageProduct" accept="image/png,image/jpeg">
        </div>
        <div class="form-group mb-3">
            <label for="category" class="form-label">Category:</label>
            <select th:field="*{category.id}" class="form-control" id="category">
                <option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}"></option>
            </select>
            <div class="alert alert-warning" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></div>
        </div>
        <input type="submit" class="btn btn-primary" value="Update Product">
    </form>
</div>
</body>
</html>
